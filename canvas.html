<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Broquer · Redesign</title>
<link rel="icon" type="image/png" href="isotipo-broquer.png"/>
<link rel="stylesheet" href="brokr-theme.css"/>
<style>
html, body { margin: 0; background: var(--paper-2); }
.frame-iframe {
  width: 100%; height: 100%;
  border: none;
  background: var(--paper);
}
.shell {
  background: var(--bone);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  height: 100%;
  width: 100%;
}
.mob-shell {
  width: 390px; height: 844px;
  background: #1F1B17;
  border-radius: 44px;
  padding: 12px;
  margin: 0 auto;
}
.mob-shell .frame-iframe {
  width: 100%; height: 100%;
  border-radius: 32px;
  background: var(--paper);
}
.desk-shell {
  width: 1280px; height: 820px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.desk-shell__bar {
  height: 36px;
  background: var(--bone);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px; flex-shrink: 0;
}
.desk-shell__bar .lights { display: flex; gap: 6px; }
.desk-shell__bar .lights span { width: 11px; height: 11px; border-radius: 50%; background: var(--line-2); }
.desk-shell__bar .lights span:nth-child(1) { background: oklch(70% .12 25); }
.desk-shell__bar .lights span:nth-child(2) { background: oklch(80% .14 80); }
.desk-shell__bar .lights span:nth-child(3) { background: oklch(70% .12 145); }
.desk-shell__bar .url {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--mute); margin-left: auto;
  background: var(--paper); padding: 4px 12px;
  border-radius: var(--r-pill); border: 1px solid var(--line);
}
.desk-shell .frame-iframe { flex: 1; }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function MobileFrame({ src }) {
  return (
    <div className="mob-shell">
      <iframe className="frame-iframe" src={src} title={src}></iframe>
    </div>
  );
}

function DesktopFrame({ src, url }) {
  return (
    <div className="desk-shell">
      <div className="desk-shell__bar">
        <div className="lights"><span/><span/><span/></div>
        <div className="url">brokr.app/{url}</div>
      </div>
      <iframe className="frame-iframe" src={src} title={src}></iframe>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas title="Broquer · Redesign" subtitle="Apple-pristine + warm professional · Ivory mode">
      <DCSection id="overview" title="Overview" subtitle="The full product, mobile + desktop, in the new system">
        <DCArtboard id="ov-dash" label="Dashboard · desktop" width={1280} height={820}>
          <DesktopFrame src="index.html" url="" />
        </DCArtboard>
        <DCArtboard id="ov-dash-m" label="Dashboard · mobile" width={414} height={868}>
          <MobileFrame src="index.html" />
        </DCArtboard>
        <DCArtboard id="ov-login" label="Login" width={414} height={868}>
          <MobileFrame src="login.html" />
        </DCArtboard>
      </DCSection>

      <DCSection id="modules" title="Modules" subtitle="Each module redesigned, functional code preserved">
        <DCArtboard id="m-props-d" label="Inmuebles · desktop" width={1280} height={820}>
          <DesktopFrame src="propiedades.html" url="propiedades" />
        </DCArtboard>
        <DCArtboard id="m-props-m" label="Inmuebles · mobile" width={414} height={868}>
          <MobileFrame src="propiedades.html" />
        </DCArtboard>
        <DCArtboard id="m-cont-d" label="Contactos · desktop" width={1280} height={820}>
          <DesktopFrame src="contactos.html" url="contactos" />
        </DCArtboard>
        <DCArtboard id="m-cont-m" label="Contactos · mobile" width={414} height={868}>
          <MobileFrame src="contactos.html" />
        </DCArtboard>
      </DCSection>

      <DCSection id="tools" title="Herramientas" subtitle="Re-skinned with the warm ivory palette · functional logic intact">
        <DCArtboard id="t-avm" label="AVM · valuación" width={414} height={868}>
          <MobileFrame src="avm.html" />
        </DCArtboard>
        <DCArtboard id="t-contratos" label="Contratos" width={414} height={868}>
          <MobileFrame src="contratos.html" />
        </DCArtboard>
        <DCArtboard id="t-ficha" label="Ficha técnica" width={414} height={868}>
          <MobileFrame src="ficha.html" />
        </DCArtboard>
        <DCArtboard id="t-ficha-manual" label="Ficha manual" width={414} height={868}>
          <MobileFrame src="ficha-manual.html" />
        </DCArtboard>
        <DCArtboard id="t-isr" label="ISR Calculador" width={414} height={868}>
          <MobileFrame src="isr.html" />
        </DCArtboard>
        <DCArtboard id="t-verif" label="Verificador" width={414} height={868}>
          <MobileFrame src="verificador.html" />
        </DCArtboard>
        <DCArtboard id="t-imgclean" label="Image cleaner" width={414} height={868}>
          <MobileFrame src="image-cleaner.html" />
        </DCArtboard>
      </DCSection>

      <DCSection id="auth-admin" title="Acceso & administración" subtitle="Páginas auxiliares re-skineadas">
        <DCArtboard id="a-registro" label="Registro" width={414} height={868}>
          <MobileFrame src="registro.html" />
        </DCArtboard>
        <DCArtboard id="a-legal" label="Legal" width={414} height={868}>
          <MobileFrame src="legal.html" />
        </DCArtboard>
        <DCArtboard id="a-admin" label="Admin · desktop" width={1280} height={820}>
          <DesktopFrame src="admin.html" url="admin" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
