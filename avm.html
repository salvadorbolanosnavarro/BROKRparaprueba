<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF">
<title>Broquer — Estimación de valor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Anton&display=swap" rel="stylesheet">
<link href="app.css" rel="stylesheet">
</head>
<body>
<div class="app">
  <div class="hd">
    <button class="cir" aria-label="Perfil"><svg class="ic" style="width:23px;height:23px"><use href="#ic-user"/></svg></button>
    <div class="wm">Broquer</div>
    <div class="hdr">
      <button class="cir" aria-label="Ayuda"><svg class="ic" style="width:22px;height:22px"><use href="#ic-help"/></svg></button>
      <button class="cir" aria-label="Notificaciones"><svg class="ic" style="width:22px;height:22px"><use href="#ic-bell"/></svg></button>
    </div>
  </div>

  <div class="pg">
    <h1 class="htitle">Estimación de valor</h1>
    <p class="hsub">Avalúo de mercado automático</p>

    <div class="card" style="padding:4px 18px 20px;margin-top:16px">
      <label class="field">
        <span class="lab">Dirección del inmueble</span>
        <input class="input" type="text" placeholder="Av. Camelinas 340, Morelia">
      </label>

      <div class="field">
        <span class="lab">Tipo de inmueble</span>
        <div class="chips" style="margin-top:0">
          <span class="chip on">Casa</span>
          <span class="chip">Departamento</span>
          <span class="chip">Terreno</span>
          <span class="chip">Local</span>
        </div>
      </div>

      <label class="field">
        <span class="lab">Superficie (m²)</span>
        <input class="input" type="text" inputmode="numeric" placeholder="240">
      </label>

      <button class="pill-fill" style="margin-top:20px">Estimar valor</button>
    </div>

    <div class="sec"><h2>Resultado</h2></div>
    <div class="result">
      <div class="rl">Valor estimado</div>
      <div class="rv">$2,480,000 <small>MXN</small></div>
      <div style="display:inline-flex;align-items:center;gap:5px;color:#3538D6;font-weight:800;font-size:13px;margin-top:2px">
        <svg class="ic" style="width:15px;height:15px"><use href="#ic-trend"/></svg>+3.2% vs. la zona
      </div>
      <div class="rrow">
        <div><div class="k">Rango</div><div class="v">2.31M–2.64M</div></div>
        <div><div class="k">Confianza</div><div class="v">86%</div></div>
        <div><div class="k">Comparables</div><div class="v">14</div></div>
      </div>
    </div>
  </div>

  <nav class="nav">
    <a class="nv" href="index.html"><svg class="ic" style="width:23px;height:23px"><use href="#ic-home"/></svg><span>Inicio</span></a>
    <a class="nv" href="propiedades.html"><svg class="ic" style="width:23px;height:23px"><use href="#ic-building"/></svg><span>Inmuebles</span></a>
    <a class="nv on" href="avm.html"><svg class="ic" style="width:23px;height:23px"><use href="#ic-chart"/></svg><span>Avalúo</span></a>
    <a class="nv" href="contratos.html"><svg class="ic" style="width:23px;height:23px"><use href="#ic-contract"/></svg><span>Contratos</span></a>
    <a class="nv" href="mas.html"><svg class="ic" style="width:23px;height:23px"><use href="#ic-grid"/></svg><span>Más</span></a>
  </nav>
</div>
<script src="icons.js"></script>
</body>
</html>
